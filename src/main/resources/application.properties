spring.application.name=aplicacion_tevcol

# CADENA DE CONEXION MYSQL (phpMyAdmin)
spring.datasource.url=jdbc:mysql://localhost:3306/aplicacion_tevcol?useSSL=false&serverTimezone=UTC

# USUARIO MYSQL (XAMPP normalmente es root)
spring.datasource.username=root

# PASSWORD MYSQL (en XAMPP normalmente es vacío)
spring.datasource.password=

# DRIVER MYSQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACION JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


server.port=8082