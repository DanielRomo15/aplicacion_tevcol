<div>
  <p class="text-muted mb-4">
    Propósito: monitorear el volumen de actas y su estado. Gráfico simple para evitar saturación.
  </p>

  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="text-muted small">Total Actas</div>
        <div class="fs-3 fw-bold" th:text="${totalActas}">0</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="text-muted small">Estado 0</div>
        <div class="fs-3 fw-bold" th:text="${estado0}">0</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="text-muted small">Estado 1</div>
        <div class="fs-3 fw-bold" th:text="${estado1}">0</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 shadow-sm p-3">
        <div class="text-muted small">Estado 2</div>
        <div class="fs-3 fw-bold" th:text="${estado2}">0</div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm p-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <div class="fw-semibold">Actas por estado</div>
        <div class="small text-muted">Tipo de gráfico: barras (comparación directa).</div>
      </div>
    </div>

    <canvas id="chartEstados"
            th:attr="data-e0=${estado0},data-e1=${estado1},data-e2=${estado2}"
            height="120"></canvas>
  </div>
</div>
