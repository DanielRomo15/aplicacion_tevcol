<div class="d-flex justify-content-end mb-3">
  <a class="btn btn-dark" th:href="@{/actas/nuevo}">+ Nueva Acta</a>
</div>

<div th:if="${#lists.isEmpty(lista)}" class="alert alert-info">
  No hay actas registradas.
</div>

<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Brigada</th>
        <th>Establecimiento</th>
        <th class="text-end">Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="a : ${lista}">
        <td th:text="${a.codigoActaBrigada}">1</td>
        <td th:text="${a.fechaActaBrigada}">2026-01-01</td>
        <td th:text="${a.estadoActaBrigada}">1</td>
        <td th:text="${a.tipoBrigada != null ? a.tipoBrigada.descripcionBrigada : 'N/A'}">Brigada</td>
        <td th:text="${a.fkCodEstablecimiento}">1</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary" th:href="@{/actas/editar/{id}(id=${a.codigoActaBrigada})}">Editar</a>
          <a class="btn btn-sm btn-outline-danger"
             th:href="@{/actas/eliminar/{id}(id=${a.codigoActaBrigada})}"
             onclick="return confirm('¿Eliminar acta?');">Eliminar</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
