<div class="mb-4">
  <h1 class="h3 fw-bold mb-1">Formulario Acta</h1>
  <p class="text-muted mb-0">Interfaz clara, moderna y sin saturación.</p>
</div>

<div th:if="${error}" class="alert alert-danger border-0 shadow-sm">
  <span th:text="${error}">Error</span>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body p-4 p-lg-5">

    <form th:action="@{/actas/guardar}" th:object="${acta}" method="post" class="row g-4">

      <!-- (opcional) Si editas, este hidden ayuda a mantener el ID -->
      <input type="hidden" th:field="*{codigoActaBrigada}"/>

      <div class="col-12 col-lg-4">
        <label class="form-label fw-semibold">Fecha Acta <span class="text-danger">*</span></label>
        <input type="date" class="form-control form-control-lg" th:field="*{fechaActaBrigada}" required>
        <div class="form-text">No puede ser futura.</div>
      </div>

      <div class="col-12 col-lg-4">
        <label class="form-label fw-semibold">Estado <span class="text-danger">*</span></label>

        <!-- Si tu BD guarda "ACTIVO/INACTIVO", esto evita el error de conversión -->
        <select class="form-select form-select-lg" th:field="*{estadoActaBrigada}" required>
          <option value="" disabled selected>Seleccione...</option>
          <option value="ACTIVO">ACTIVO</option>
          <option value="INACTIVO">INACTIVO</option>
        </select>

        <div class="form-text">Use ACTIVO o INACTIVO.</div>
      </div>

      <div class="col-12 col-lg-4">
        <label class="form-label fw-semibold">Establecimiento <span class="text-danger">*</span></label>
        <input type="number" min="1" class="form-control form-control-lg" th:field="*{fkCodEstablecimiento}" required>
      </div>

      <div class="col-12 col-lg-6">
        <label class="form-label fw-semibold">Brigada <span class="text-danger">*</span></label>

        <select class="form-select form-select-lg" name="fkTipoBrigada" required>
          <option value="" disabled selected>Seleccione...</option>

          <!-- ✅ AQUÍ ESTABA TU ERROR: antes decía b.codigoTipoBrigada -->
          <!-- Si tu ID NO se llama "codigoBrigada", cámbialo por el nombre real -->
          <option th:each="b : ${brigadas}"
                  th:value="${b.codigoBrigada}"
                  th:text="${b.descripcionBrigada}">
            Brigada
          </option>
        </select>
      </div>

      <div class="col-12 col-lg-6">
        <label class="form-label fw-semibold">Link Archivo <span class="text-danger">*</span></label>
        <input type="url" class="form-control form-control-lg"
               placeholder="https://..."
               th:field="*{linkArchivoActaBrigada}" required>
      </div>

      <div class="col-12 d-flex gap-2 mt-2">
        <button type="submit" class="btn btn-dark btn-lg px-4 rounded-pill">Guardar</button>
        <a th:href="@{/actas}" class="btn btn-outline-secondary btn-lg px-4 rounded-pill">Cancelar</a>
      </div>

    </form>
  </div>
</div>
