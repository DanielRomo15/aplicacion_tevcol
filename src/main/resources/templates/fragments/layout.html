<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${titulo}">TEVCOL</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
</head>

<body th:fragment="layout(titulo, contenido)">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" th:href="@{/dashboard}">TEVCOL</a>

    <div class="d-flex gap-2">
     
      <form th:action="@{/logout}" method="post" class="m-0 p-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <aside class="col-12 col-md-3 col-lg-2 sidebar p-3">
      <div class="small text-muted mb-2">Menú</div>
      <div class="list-group list-group-flush">
        <a class="list-group-item list-group-item-action" th:href="@{/dashboard}">Dashboard</a>
        <a class="list-group-item list-group-item-action" th:href="@{/brigadas}">Tipo Brigada</a>
        <a class="list-group-item list-group-item-action" th:href="@{/actas}">Actas Brigada</a>
      </div>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h3 class="fw-bold mb-0" th:text="${titulo}">Título</h3>
          
        </div>
      </div>

      <div th:replace="${contenido}"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
