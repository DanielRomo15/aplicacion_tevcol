<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} ?: 'TEVCOL - Sistema'">TEVCOL</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">

  <!-- ====== TEVCOL Dark Premium (solo 1 archivo) ====== -->
  <style>
    :root{
      --bg0:#070A0F;
      --bg1:#0B1020;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.66);
      --muted2:rgba(255,255,255,.55);

      --brand:#FFC107; /* dorado tipo la imagen */
      --brand2:#FFD54F;

      --radius:18px;
      --radius2:22px;

      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --shadow2: 0 10px 25px rgba(0,0,0,.35);
    }

    body{
      background:
        radial-gradient(1000px 600px at 10% 10%, rgba(255,193,7,.15), transparent 55%),
        radial-gradient(900px 520px at 90% 0%, rgba(13,110,253,.14), transparent 55%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 60%, #05070C 100%);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navbar elegante */
    .navbar{
      background: rgba(0,0,0,.35) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--stroke) !important;
      box-shadow: var(--shadow2);
    }

    .navbar .navbar-brand{
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--text) !important;
      display:flex;
      align-items:center;
      gap:.6rem;
    }

    .navbar .navbar-brand::before{
      content:"";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, var(--brand2), var(--brand));
      box-shadow: 0 0 0 3px rgba(255,193,7,.14);
      display:inline-block;
    }

    /* Botones estilo web corporativa */
    .btn{
      border-radius: 999px !important;
      font-weight: 600;
      letter-spacing: .01em;
    }

    .btn-outline-light{
      border-color: rgba(255,255,255,.32) !important;
      color: var(--text) !important;
    }
    .btn-outline-light:hover{
      background: rgba(255,255,255,.10) !important;
      border-color: rgba(255,255,255,.45) !important;
      transform: translateY(-1px);
    }

    .btn-dark{
      background: rgba(255,255,255,.12) !important;
      border: 1px solid rgba(255,255,255,.18) !important;
      color: var(--text) !important;
      box-shadow: var(--shadow2);
    }
    .btn-dark:hover{
      background: rgba(255,255,255,.16) !important;
      transform: translateY(-1px);
    }

    /* Layout principal */
    .container-fluid{
      padding-left: 18px;
      padding-right: 18px;
    }

    /* Sidebar tipo panel de vidrio */
    .sidebar{
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      position: sticky;
      top: 86px;
      height: calc(100vh - 100px);
      overflow: auto;
    }

    .sidebar .small{
      color: var(--muted) !important;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* Menú */
    .list-group{
      background: transparent !important;
    }

    .list-group-item{
      background: transparent !important;
      border: 1px solid transparent !important;
      color: var(--text) !important;
      border-radius: 14px !important;
      margin-bottom: 8px;
      padding: 12px 14px;
      transition: all .15s ease-in-out;
    }
    .list-group-item:hover{
      background: rgba(255,255,255,.07) !important;
      border-color: rgba(255,255,255,.12) !important;
      transform: translateX(3px);
    }

    /* Link activo (si puedes, luego le ponemos th:classappend con la ruta) */
    .list-group-item.active{
      background: rgba(255,193,7,.12) !important;
      border-color: rgba(255,193,7,.28) !important;
      color: var(--text) !important;
    }

    /* Main: contenedor tipo “hero” suave */
    main{
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      min-height: calc(100vh - 100px);
      position: relative;
      overflow: hidden;
    }

    /* Líneas diagonales decorativas (tipo la imagen) */
    main::before{
      content:"";
      position:absolute;
      inset:-40px -60px auto auto;
      width: 380px;
      height: 280px;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,193,7,.0) 0px,
          rgba(255,193,7,.0) 10px,
          rgba(255,193,7,.10) 10px,
          rgba(255,193,7,.10) 14px
        );
      filter: blur(.2px);
      opacity: .55;
      transform: rotate(6deg);
      pointer-events:none;
    }

    main::after{
      content:"";
      position:absolute;
      inset:auto auto -120px -120px;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle at 30% 30%, rgba(255,193,7,.18), transparent 60%);
      pointer-events:none;
    }

    /* Card + table en dark */
    .card{
      background: rgba(255,255,255,.05) !important;
      border: 1px solid rgba(255,255,255,.08) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow2);
    }

    .table{
      color: var(--text);
    }

    .table thead th{
      color: var(--muted);
      background: rgba(255,255,255,.05) !important;
      border-bottom-color: rgba(255,255,255,.08) !important;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      font-size: .78rem;
    }

    .table tbody td{
      border-top-color: rgba(255,255,255,.07) !important;
      color: var(--text);
    }

    .table-hover tbody tr:hover{
      background: rgba(255,255,255,.05) !important;
    }

    /* Inputs */
    .form-control, .form-select{
      background: rgba(0,0,0,.20) !important;
      border: 1px solid rgba(255,255,255,.14) !important;
      color: var(--text) !important;
      border-radius: 14px !important;
    }
    .form-control::placeholder{
      color: rgba(255,255,255,.45);
    }
    .form-control:focus, .form-select:focus{
      border-color: rgba(255,193,7,.45) !important;
      box-shadow: 0 0 0 .20rem rgba(255,193,7,.12) !important;
    }

    .text-muted{
      color: var(--muted2) !important;
    }

    /* Scrollbar sutil (Chrome/Edge) */
    .sidebar::-webkit-scrollbar{
      width: 10px;
    }
    .sidebar::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0);
      background-clip: padding-box;
    }
    .sidebar::-webkit-scrollbar-thumb:hover{
      background: rgba(255,255,255,.18);
      background-clip: padding-box;
    }

    /* Responsive: sidebar como panel arriba */
    @media (max-width: 767.98px){
      .sidebar{
        position: static;
        height: auto;
        margin-bottom: 14px;
      }
      main{
        min-height: auto;
      }
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid py-2">
    <a class="navbar-brand" th:href="@{/dashboard}">TEVCOL</a>

    <div class="d-flex gap-2">
      <a class="btn btn-outline-light btn-sm px-3" th:href="@{/logout}">Salir</a>
    </div>
  </div>
</nav>

<div class="container-fluid my-3">
  <div class="row g-3">
    <aside class="col-12 col-md-3 col-lg-2 sidebar p-3">
      <div class="small mb-2">Menú</div>
      <div class="list-group list-group-flush">
        <a class="list-group-item list-group-item-action" th:href="@{/dashboard}">Dashboard</a>
        <a class="list-group-item list-group-item-action" th:href="@{/brigadas}">Tipo Brigada</a>
        <a class="list-group-item list-group-item-action" th:href="@{/actas}">Actas Brigada</a>
      </div>
    </aside>

    <main class="col-12 col-md-9 col-lg-10 p-4">
      <div th:replace="${content}"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
