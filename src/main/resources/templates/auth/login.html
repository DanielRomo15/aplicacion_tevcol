<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login - TEVCOL</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-soft">
<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm border-0 p-4" style="max-width: 420px; width: 100%;">
    <h4 class="mb-1 fw-bold">TEVCOL</h4>
    <p class="text-muted mb-4">Ingreso al sistema</p>

    <div th:if="${param.error}" class="alert alert-danger py-2">Usuario o contraseña incorrectos</div>
    <div th:if="${param.logout}" class="alert alert-success py-2">Sesión cerrada</div>

    <form th:action="@{/login}" method="post" class="d-grid gap-3">
      <div>
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" placeholder="admin" required>
      </div>

      <div>
        <label class="form-label">Contraseña</label>
        <input class="form-control" type="password" name="password" placeholder="Admin123*" required>
      </div>

      <button class="btn btn-dark">Entrar</button>

      <div class="small text-muted">
        
      </div>
    </form>
  </div>
</div>
</body>
</html>
