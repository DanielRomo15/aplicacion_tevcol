<div class="d-flex justify-content-end mb-3">
  <a class="btn btn-dark" th:href="@{/brigadas/nuevo}">+ Nueva Brigada</a>
</div>

<div th:if="${#lists.isEmpty(lista)}" class="alert alert-info">
  No hay brigadas registradas.
</div>

<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>Link</th>
        <th>Establecimiento</th>
        <th class="text-end">Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="b : ${lista}">
        <td th:text="${b.codigoBrigada}">1</td>
        <td th:text="${b.descripcionBrigada}">...</td>
        <td>
          <a th:href="${b.linkBrigada}" target="_blank" th:text="${b.linkBrigada}">link</a>
        </td>
        <td th:text="${b.fkCodEstablecimiento}">1</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary" th:href="@{/brigadas/editar/{id}(id=${b.codigoBrigada})}">Editar</a>
          <a class="btn btn-sm btn-outline-danger"
             th:href="@{/brigadas/eliminar/{id}(id=${b.codigoBrigada})}"
             onclick="return confirm('¿Eliminar brigada?');">Eliminar</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
